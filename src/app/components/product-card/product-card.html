<div class="h-100 card overflow-hidden d-flex flex-column">
  <img
    [src]="product.image"
    class="w-100 ratio-16x9 object-fit-cover overflow-hidden"
    [attr.alt]="product.title"
  />
  <div class="card-body flex-grow-1">
    <span
      class="badge"
      [class.text-bg-success]="product.inStock"
      [class.text-bg-danger]="!product.inStock"
      >{{ product.inStock ? 'In stock' : 'Out of stock' }}</span
    >
    <h5 class="card-title mt-2 fw-semibold">{{ product.title }}</h5>
    <p class="card-text">
      {{ product.description }}
    </p>
    <!-- product.inStock && -->
    @if (product.inStock) {
      <div class="d-flex justify-content-between align-items-center gap-5">
        <p
          class="fw-bold mb-0"
          [class.text-success]="product.price <= 100"
          [class.text-danger]="product.price > 100"
        >
          {{ product.price }} $
        </p>
        <button class="btn btn-primary">Add to cart</button>
      </div>
    } @else {
      <p class="text-danger text-center fw-bold mb-0">Out of stock</p>
    }
  </div>
</div>
