<div class="col">
  <div class="card">
    <img src="{{ product.image }}" class="card-img-top" alt="{{ product.title }}" />
    <div class="card-body">
      <h5 class="card-title">{{ product.title }}</h5>
      <p class="card-text">
        {{ product.description }}
      </p>
      <p class="text-primary">{{ product.price }} $</p>
      <button class="btn btn-primary">Show Details</button>
    </div>
  </div>
</div>
